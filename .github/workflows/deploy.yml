name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'ENDSSH'
            set -e

            APP_DIR="/opt/bookdemo"
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            # Clone or pull latest code
            if [ -d ".git" ]; then
              git fetch origin main
              git reset --hard origin/main
            else
              git clone https://github.com/global-expert/BookDemo.git .
            fi

            # Write .env file from secret
            cat > .env << 'ENVEOF'
          ${{ secrets.ENV_FILE }}
          ENVEOF

            # Build and run with Docker
            docker build -t bookdemo:latest .
            docker stop bookdemo 2>/dev/null || true
            docker rm bookdemo 2>/dev/null || true
            docker run -d \
              --name bookdemo \
              --restart unless-stopped \
              --env-file .env \
              -p 8000:8000 \
              bookdemo:latest

            echo "Deployment complete!"
          ENDSSH
